{% extends "base.html" %}

{% block content %}

<div class="tool-container">

    <h1>🎨 Background Remover</h1>

    <p class="subtitle">
        Upload an image to remove its background automatically.
    </p>

    <form action="/remove-background"
          method="POST"
          enctype="multipart/form-data">

        <label>Select an Image</label>

        <br><br>

        <input
            type="file"
            name="image"
            accept=".png,.jpg,.jpeg"
            required>

        <br><br>

        <button type="submit">
            Remove Background
        </button>

    </form>

</div>

{% endblock %}
